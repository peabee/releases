name: upup64-rr

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      release:
        type: boolean
        description: 'Upload release'
        required: true
        default: true

jobs:
  urr:
    uses: peabee/woof-CE/.github/workflows/build.yml@testing
    with:
      repo: peabee/woof-CE
      ref: testing
      name: 'ResolutePup64'
      version: '26.04'
      arch: x86_64
      compat-distro: ubuntu
      compat-distro-version: resolute64
      kernel: 'ubuntu-resolute'
      prefix: upup64rr
      artifact: ResolutePup64-${{ github.run_number }}
      retention: 1

  uploadrr:
    needs: urr
    runs-on: ubuntu-24.04
    steps:
      - name: Get current date
        id: version
        run: echo "builddate=$(date +'%y%m%d')" >> $GITHUB_OUTPUT
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ResolutePup64-${{ github.run_number }}
          path: .
      - name: Generate SHA512 checksums
        run: |
          mv upup64rr-26.04.iso ResolutePup64-26.04-${{ steps.version.outputs.builddate }}.iso
          find . -type f -name '*.sfs' -exec sha512sum {} \; > SHA512checksums.txt
          find . -type f -name '*.iso' -exec sha512sum {} \; >> SHA512checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ResolutePup64-26.04
          tag_name: ResolutePup64/release-${{ steps.version.outputs.builddate }}
          fail_on_unmatched_files: true
          files: |
            *.iso
            *.sfs
            SHA512checksums.txt
